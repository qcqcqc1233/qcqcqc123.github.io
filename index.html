<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nathalie Berger | Motion Resume</title>

  <meta name="description" content="Play to view my motion design portfolio and CV <3" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />

  <meta property="og:title" content="Nathalie Berger | Motion Resume" />
  <meta property="og:description" content="Play to view my motion design portfolio and CV <3" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="motion by nath" />
  <meta property="og:url" content="https://www.motionbynath.com/" />
  <meta property="og:image" content="https://www.motionbynath.com/favicon.png" />
  <meta property="og:image:secure_url" content="https://www.motionbynath.com/favicon.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="motion by nath" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nathalie Berger | Motion Resume" />
  <meta name="twitter:description" content="Play to view my motion design portfolio and CV <3" />
  <meta name="twitter:image" content="https://www.motionbynath.com/favicon.png" />

  <link rel="canonical" href="https://www.motionbynath.com/" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>

  <style>
    :root {
      --splash-bg: #FFE0CF;
      --ink: #2E2B7D;
      --brand: #373e8e;
      --brand-glass: rgba(55, 62, 142, 0.45);
      --brand-glass-hover: rgba(55, 62, 142, 0.62);
      --brand-border: rgba(55, 62, 142, 0.55);
      --stage: #000000;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-hover: rgba(255, 255, 255, 0.16);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--stage);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #fff;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============ VIDEO STAGE ============ */
    #video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: var(--stage);
      z-index: 1;
      outline: none;
      cursor: pointer;
    }

    /* ============ FLOATING ACTION MENU ============ */
    .fab-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
    }

    .fab-container.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .fab {
      background: var(--brand-glass);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      backdrop-filter: blur(12px) saturate(150%);
      border: 1px solid var(--brand-border);
      color: #fff;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28), 0 2px 6px rgba(55, 62, 142, 0.2);
      transition:
        transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1),
        background 0.3s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease,
        opacity 0.35s ease;
      position: relative;
    }

    .fab:hover {
      background: var(--brand-glass-hover);
      border-color: rgba(255, 255, 255, 0.55);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(55, 62, 142, 0.25);
    }

    .fab:active {
      transform: scale(0.94);
    }

    .fab-main {
      width: 58px;
      height: 58px;
      border-width: 1.5px;
    }

    .fab-main .plus-icon {
      width: 22px;
      height: 22px;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
      transition: transform 0.45s cubic-bezier(0.68, -0.3, 0.265, 1.35);
      pointer-events: none;
    }

    .fab-container.open .fab-main .plus-icon {
      transform: rotate(135deg);
    }

    .fab-container.open .fab-main {
      background: var(--brand-glass-hover);
      border-color: rgba(255, 255, 255, 0.55);
    }

    /* Sub-FABs: stacked above main, hidden by default */
    .fab-sub {
      width: 46px;
      height: 46px;
      order: -1; /* push above main in normal column flow */
      opacity: 0;
      transform: translateY(18px) scale(0.55);
      pointer-events: none;
      transition:
        opacity 0.32s ease,
        transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .fab-sub svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      pointer-events: none;
    }

    .fab-container.open .fab-sub {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    /* Staggered reveal */
    .fab-container.open .fab-sub.sub-pdf       { transition-delay: 0.04s; }
    .fab-container.open .fab-sub.sub-portfolio { transition-delay: 0.1s; }

    /* Desktop: tooltips on sub buttons */
    .fab-sub .tooltip {
      position: absolute;
      right: calc(100% + 14px);
      top: 50%;
      transform: translateY(-50%) translateX(6px);
      background: var(--brand-glass);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      backdrop-filter: blur(12px) saturate(150%);
      border: 1px solid var(--brand-border);
      color: #fff;
      padding: 6px 14px;
      border-radius: 999px;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .fab-container.open .fab-sub:hover .tooltip {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
    }

    /* On touch devices, hide tooltip entirely */
    @media (hover: none) {
      .fab-sub .tooltip { display: none; }
    }

    /* ============ PAUSE PILL ============ */
    .pause-pill {
      position: fixed;
      top: 28px;
      left: 50%;
      z-index: 8;
      transform: translateX(-50%) translateY(-14px);
      background: rgba(255, 255, 255, 0.72);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      backdrop-filter: blur(14px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.55);
      color: var(--brand);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transition:
        opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .pause-pill.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 900px) and (hover: hover) and (pointer: fine) {
      .fab-container {
        bottom: 36px;
        right: 36px;
        gap: 16px;
      }
      .fab-main {
        width: 66px;
        height: 66px;
      }
      .fab-main .plus-icon {
        width: 26px;
        height: 26px;
      }
      .fab-sub {
        width: 52px;
        height: 52px;
      }
      .fab-sub svg {
        width: 20px;
        height: 20px;
      }
      .pause-pill {
        top: 32px;
        font-size: 14px;
        padding: 11px 22px;
      }
    }

    /* ============ SPLASH OVERLAY ============ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--splash-bg);
      cursor: pointer;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lottie-wrap {
      width: min(42vw, 320px);
      height: min(42vw, 320px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.4s ease-in-out infinite;
      will-change: transform;
    }

    .lottie-wrap lottie-player {
      width: 100%;
      height: 100%;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    .splash-hint {
      position: absolute;
      bottom: max(28px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.55;
      animation: fadeBreath 3.2s ease-in-out infinite;
    }

    @keyframes fadeBreath {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 0.7; }
    }

    .rotate-hint {
      display: none;
      position: absolute;
      bottom: max(48px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: lowercase;
      color: var(--ink);
      opacity: 0.72;
    }

    .rotate-hint::before {
      content: '';
      display: block;
      width: 22px;
      height: 22px;
      margin: 0 auto 14px;
      border: 1.5px solid currentColor;
      border-radius: 4px;
      opacity: 0.8;
      animation: rotate 2.8s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes rotate {
      0%, 20%   { transform: rotate(0deg); }
      50%, 70%  { transform: rotate(90deg); }
      100%      { transform: rotate(0deg); }
    }

    @media (orientation: portrait) and (max-width: 900px) {
      .splash-hint {
        display: none;
      }
      .rotate-hint {
        display: block;
      }
      .lottie-wrap {
        width: min(58vw, 280px);
        height: min(58vw, 280px);
      }
    }

    @media (max-width: 640px) {
      .fab-container {
        bottom: 20px;
        right: 20px;
        gap: 12px;
      }
      .fab-main {
        width: 54px;
        height: 54px;
      }
      .fab-sub {
        width: 44px;
        height: 44px;
      }
      .pause-pill {
        top: 20px;
        font-size: 12px;
        padding: 9px 18px;
      }
    }

    /* Fullscreen polish — hide default cursor on idle video */
    :fullscreen #video,
    :-webkit-full-screen #video {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <video
    id="video"
    src="resume.mp4"
    preload="auto"
    playsinline
    webkit-playsinline
    loop></video>

  <div id="pausePill" class="pause-pill" role="status" aria-live="polite">
    ⏸&nbsp;&nbsp;Take your time
  </div>

  <nav id="fab" class="fab-container" aria-label="Resume actions">
    <a
      class="fab fab-sub sub-portfolio"
      href="https://www.behance.net/motionbynath"
      target="_blank"
      rel="noopener"
      aria-label="Full Portfolio on Behance">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1.2" />
        <rect x="14" y="3" width="7" height="7" rx="1.2" />
        <rect x="3" y="14" width="7" height="7" rx="1.2" />
        <rect x="14" y="14" width="7" height="7" rx="1.2" />
      </svg>
      <span class="tooltip">Full Portfolio</span>
    </a>
    <a
      class="fab fab-sub sub-pdf"
      href="cv.pdf"
      target="_blank"
      rel="noopener"
      download
      aria-label="PDF Version of Resume">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" />
        <path d="M14 3v5h5" />
        <path d="M9 14h6M9 17h4" />
      </svg>
      <span class="tooltip">PDF Version</span>
    </a>
    <button
      id="fabMain"
      class="fab fab-main"
      type="button"
      aria-label="Open menu"
      aria-expanded="false">
      <svg class="plus-icon" viewBox="0 0 24 24" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </button>
  </nav>

  <div id="splash" role="button" tabindex="0" aria-label="Play motion resume">
    <div class="lottie-wrap">
      <lottie-player
        id="lottie"
        src="splash.json"
        autoplay
        loop
        background="transparent"
        speed="1">
      </lottie-player>
    </div>
    <div class="splash-hint">click anywhere to play</div>
    <div class="rotate-hint">please rotate your device</div>
  </div>

  <script>
    (function () {
      const splash    = document.getElementById('splash');
      const video     = document.getElementById('video');
      const fab       = document.getElementById('fab');
      const fabMain   = document.getElementById('fabMain');
      const pausePill = document.getElementById('pausePill');
      let started = false;

      /* ============ FULLSCREEN ============ */
      function requestFullscreen(el) {
        const fn =
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.mozRequestFullScreen ||
          el.msRequestFullscreen;
        if (!fn) return Promise.resolve();
        try {
          const result = fn.call(el);
          return result && typeof result.then === 'function' ? result : Promise.resolve();
        } catch (_) {
          return Promise.resolve();
        }
      }

      /* ============ START SEQUENCE ============ */
      function start() {
        if (started) return;
        started = true;

        splash.classList.add('hidden');

        video.muted = false;
        video.volume = 1.0;
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {
            video.muted = true;
            video.play().catch(() => {});
          });
        }

        requestFullscreen(document.documentElement).catch(() => {});

        setTimeout(() => {
          splash.style.visibility = 'hidden';
          fab.classList.add('visible');
        }, 800);
      }

      splash.addEventListener('click', start);
      splash.addEventListener('touchend', function (e) {
        e.preventDefault();
        start();
      }, { passive: false });
      splash.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          start();
        }
      });

      /* ============ FLOATING ACTION MENU ============ */
      function setMenu(open) {
        fab.classList.toggle('open', open);
        fabMain.setAttribute('aria-expanded', String(open));
        fabMain.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
      }

      fabMain.addEventListener('click', function (e) {
        e.stopPropagation();
        setMenu(!fab.classList.contains('open'));
      });

      /* Prevent sub-button clicks from bubbling into the video pause toggle */
      fab.querySelectorAll('.fab-sub').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          /* Close menu after navigation initiates */
          setTimeout(() => setMenu(false), 150);
        });
      });

      /* Close menu if user clicks outside of it */
      document.addEventListener('click', function (e) {
        if (!started) return;
        if (fab.classList.contains('open') && !fab.contains(e.target)) {
          setMenu(false);
        }
      });

      /* Keyboard: Escape closes menu */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && fab.classList.contains('open')) {
          setMenu(false);
        }
      });

      /* ============ VIDEO PLAY / PAUSE TOGGLE ============ */
      function togglePlayback() {
        if (!started) return;
        if (video.paused) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      }

      video.addEventListener('click', function (e) {
        /* FAB click handlers already stopPropagation, but double-guard */
        if (fab.contains(e.target)) return;
        togglePlayback();
      });

      video.addEventListener('pause', function () {
        if (!started) return;
        pausePill.classList.add('visible');
      });

      video.addEventListener('play', function () {
        pausePill.classList.remove('visible');
      });

      /* ============ FULLSCREEN CHANGE ============ */
      document.addEventListener('fullscreenchange', handleFsChange);
      document.addEventListener('webkitfullscreenchange', handleFsChange);
      document.addEventListener('mozfullscreenchange', handleFsChange);
      document.addEventListener('MSFullscreenChange', handleFsChange);

      function handleFsChange() {
        /* UI persists on fullscreen exit; nothing to do */
      }
    })();
  </script>
</body>
</html>
