<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nathalie Berger | Motion Resume</title>

  <meta name="description" content="Play to view my motion design portfolio and CV <3" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />

  <meta property="og:title" content="Nathalie Berger | Motion Resume" />
  <meta property="og:description" content="Play to view my motion design portfolio and CV <3" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="motion by nath" />
  <meta property="og:url" content="https://www.motionbynath.com/" />
  <meta property="og:image" content="https://www.motionbynath.com/favicon.png" />
  <meta property="og:image:secure_url" content="https://www.motionbynath.com/favicon.png" />

  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="motion by nath" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nathalie Berger | Motion Resume" />
  <meta name="twitter:description" content="Play to view my motion design portfolio and CV <3" />
  <meta name="twitter:image" content="https://www.motionbynath.com/favicon.png" />

  <link rel="canonical" href="https://www.motionbynath.com/" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>

  <style>
    :root {
      --splash-bg: #FFE0CF;
      --ink: #2E2B7D;
      --stage: #000000;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-hover: rgba(255, 255, 255, 0.16);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--stage);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #fff;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============ VIDEO STAGE ============ */
    #video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: var(--stage);
      z-index: 1;
      outline: none;
    }

    /* ============ PDF BUTTON ============ */
    .pdf-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #fff;
      text-decoration: none;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s ease, opacity 0.6s ease 0.4s;
      opacity: 0;
      pointer-events: none;
      cursor: grab;
      touch-action: none;
      -webkit-user-drag: none;
      user-select: none;
      white-space: nowrap;
    }

    .pdf-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .pdf-btn:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.45);
      transform: translateY(-2px);
    }

    .pdf-btn.dragging {
      cursor: grabbing;
      transition: background 0.35s ease, border-color 0.35s ease;
      transform: none;
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .pdf-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    /* Desktop: slightly larger, more inviting */
    @media (min-width: 900px) and (hover: hover) and (pointer: fine) {
      .pdf-btn {
        bottom: 36px;
        right: 36px;
        padding: 16px 30px;
        font-size: 16px;
        gap: 14px;
        letter-spacing: 0.045em;
      }
      .pdf-btn svg {
        width: 18px;
        height: 18px;
      }
    }

    /* ============ SPLASH OVERLAY ============ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--splash-bg);
      cursor: pointer;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lottie-wrap {
      width: min(42vw, 320px);
      height: min(42vw, 320px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.4s ease-in-out infinite;
      will-change: transform;
    }

    .lottie-wrap lottie-player {
      width: 100%;
      height: 100%;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    .splash-hint {
      position: absolute;
      bottom: max(28px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.55;
      animation: fadeBreath 3.2s ease-in-out infinite;
    }

    @keyframes fadeBreath {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 0.7; }
    }

    .rotate-hint {
      display: none;
      position: absolute;
      bottom: max(48px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: lowercase;
      color: var(--ink);
      opacity: 0.72;
    }

    .rotate-hint::before {
      content: '';
      display: block;
      width: 22px;
      height: 22px;
      margin: 0 auto 14px;
      border: 1.5px solid currentColor;
      border-radius: 4px;
      opacity: 0.8;
      animation: rotate 2.8s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes rotate {
      0%, 20%   { transform: rotate(0deg); }
      50%, 70%  { transform: rotate(90deg); }
      100%      { transform: rotate(0deg); }
    }

    @media (orientation: portrait) and (max-width: 900px) {
      .splash-hint {
        display: none;
      }
      .rotate-hint {
        display: block;
      }
      .lottie-wrap {
        width: min(58vw, 280px);
        height: min(58vw, 280px);
      }
    }

    @media (max-width: 640px) {
      .pdf-btn {
        bottom: 18px;
        right: 18px;
        padding: 10px 18px;
        font-size: 12px;
      }
    }

    /* Fullscreen polish — hide default cursor on idle video */
    :fullscreen #video,
    :-webkit-full-screen #video {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <video
    id="video"
    src="resume.mp4"
    preload="auto"
    playsinline
    webkit-playsinline
    loop></video>

  <a
    id="pdfBtn"
    class="pdf-btn"
    href="cv.pdf"
    target="_blank"
    rel="noopener"
    download
    aria-label="Download PDF Resume">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 4v12m0 0l-4-4m4 4l4-4M5 20h14" />
    </svg>
    Download PDF Resume
  </a>

  <div id="splash" role="button" tabindex="0" aria-label="Play motion resume">
    <div class="lottie-wrap">
      <lottie-player
        id="lottie"
        src="splash.json"
        autoplay
        loop
        background="transparent"
        speed="1">
      </lottie-player>
    </div>
    <div class="splash-hint">click anywhere to play</div>
    <div class="rotate-hint">please rotate your device</div>
  </div>

  <script>
    (function () {
      const splash = document.getElementById('splash');
      const video = document.getElementById('video');
      const pdfBtn = document.getElementById('pdfBtn');
      let started = false;

      function requestFullscreen(el) {
        const fn =
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.mozRequestFullScreen ||
          el.msRequestFullscreen;
        if (!fn) return Promise.resolve();
        try {
          const result = fn.call(el);
          return result && typeof result.then === 'function' ? result : Promise.resolve();
        } catch (_) {
          return Promise.resolve();
        }
      }

      function start() {
        if (started) return;
        started = true;

        splash.classList.add('hidden');

        video.muted = false;
        video.volume = 1.0;
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {
            video.muted = true;
            video.play().catch(() => {});
          });
        }

        requestFullscreen(document.documentElement).catch(() => {});

        setTimeout(() => {
          splash.style.visibility = 'hidden';
          pdfBtn.classList.add('visible');
        }, 800);
      }

      splash.addEventListener('click', start);
      splash.addEventListener('touchend', function (e) {
        e.preventDefault();
        start();
      }, { passive: false });
      splash.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          start();
        }
      });

      document.addEventListener('fullscreenchange', handleFsChange);
      document.addEventListener('webkitfullscreenchange', handleFsChange);
      document.addEventListener('mozfullscreenchange', handleFsChange);
      document.addEventListener('MSFullscreenChange', handleFsChange);

      function handleFsChange() {
        const fsEl =
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.mozFullScreenElement ||
          document.msFullscreenElement;
        if (!fsEl && started) {
          /* user exited fullscreen — keep playback, UI remains visible */
        }
      }

      video.addEventListener('ended', function () {
        pdfBtn.classList.add('visible');
      });

      /* ============ DRAGGABLE PDF BUTTON ============ */
      (function enableDrag() {
        const DRAG_THRESHOLD = 5;
        let pointerId = null;
        let startX = 0, startY = 0;
        let originX = 0, originY = 0;
        let moved = false;
        let dragging = false;

        function clamp(v, min, max) {
          return Math.max(min, Math.min(max, v));
        }

        function onPointerDown(e) {
          if (!pdfBtn.classList.contains('visible')) return;
          if (e.button !== undefined && e.button !== 0) return;

          pointerId = e.pointerId;
          pdfBtn.setPointerCapture(pointerId);

          const rect = pdfBtn.getBoundingClientRect();
          originX = rect.left;
          originY = rect.top;

          pdfBtn.style.left = originX + 'px';
          pdfBtn.style.top = originY + 'px';
          pdfBtn.style.right = 'auto';
          pdfBtn.style.bottom = 'auto';

          startX = e.clientX;
          startY = e.clientY;
          moved = false;
          dragging = true;
        }

        function onPointerMove(e) {
          if (!dragging || e.pointerId !== pointerId) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;

          if (!moved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
            moved = true;
            pdfBtn.classList.add('dragging');
          }

          if (moved) {
            const rect = pdfBtn.getBoundingClientRect();
            const nextX = clamp(originX + dx, 8, window.innerWidth - rect.width - 8);
            const nextY = clamp(originY + dy, 8, window.innerHeight - rect.height - 8);
            pdfBtn.style.left = nextX + 'px';
            pdfBtn.style.top = nextY + 'px';
          }
        }

        function onPointerUp(e) {
          if (e.pointerId !== pointerId) return;
          dragging = false;
          try { pdfBtn.releasePointerCapture(pointerId); } catch (_) {}
          pointerId = null;
          pdfBtn.classList.remove('dragging');
        }

        pdfBtn.addEventListener('pointerdown', onPointerDown);
        pdfBtn.addEventListener('pointermove', onPointerMove);
        pdfBtn.addEventListener('pointerup', onPointerUp);
        pdfBtn.addEventListener('pointercancel', onPointerUp);

        pdfBtn.addEventListener('click', function (e) {
          if (moved) {
            e.preventDefault();
            e.stopPropagation();
            moved = false;
          }
        });

        pdfBtn.addEventListener('dragstart', function (e) {
          e.preventDefault();
        });
      })();
    })();
  </script>
</body>
</html>
